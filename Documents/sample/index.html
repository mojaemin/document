<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조사보고서 허브</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; padding: 48px 32px; }
    h1 { font-size: 1.6rem; color: #1a1a1a; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 40px; font-size: 0.95rem; }
    .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 40px;
      text-decoration: none;
      color: #1a1a1a;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      min-width: 200px;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .card .emoji { font-size: 2.4rem; margin-bottom: 12px; }
    .card .title { font-size: 1.05rem; font-weight: 600; }
    .card .sub { font-size: 0.85rem; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 조사보고서 허브</h1>
    <p>열람할 보고서를 선택하세요</p>
    <div class="cards">
      <a class="card" href="./aw2026">
        <div class="emoji">🌾</div>
        <div class="title">AW 2026</div>
        <div class="sub">참가업체 조사보고서</div>
      </a>
      <a class="card" href="./ites2026">
        <div class="emoji">🌱</div>
        <div class="title">ITES 2026</div>
        <div class="sub">스마트팜 조사보고서</div>
      </a>
    </div>
  </div>
</body>
</html>
